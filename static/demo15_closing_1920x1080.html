<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Demo 15 — Closing Slide</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; font-family: -apple-system, 'Segoe UI', sans-serif; }

  .slide {
    width: 1920px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    margin: 40px auto;
    background-color: #1a1d23;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .crosshair {
    position: absolute;
    width: 24px;
    height: 24px;
    border: 1.5px solid rgba(79, 195, 247, 0.25);
    border-radius: 50%;
  }
  .crosshair::before, .crosshair::after {
    content: '';
    position: absolute;
    background: rgba(79, 195, 247, 0.25);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
  }
  .crosshair::before { width: 10px; height: 1.5px; }
  .crosshair::after { width: 1.5px; height: 10px; }

  .logo-icon {
    width: 72px;
    height: 72px;
    background: #1976d2;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
    box-shadow: 0 8px 32px rgba(21, 101, 192, 0.3);
  }
  .logo-icon svg { width: 42px; height: 42px; }

  .title {
    font-size: 64px;
    font-weight: 700;
    letter-spacing: -2px;
    margin-bottom: 16px;
  }
  .title .w { color: #ffffff; }
  .title .c { color: #4fc3f7; }

  .tagline {
    font-size: 24px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 40px;
    letter-spacing: -0.3px;
  }

  .headline {
    font-size: 36px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -1px;
    margin-bottom: 48px;
  }
  .headline .cyan { color: #4fc3f7; }
  .headline .amber { color: #FFB300; }

  .cta {
    font-size: 18px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.5px;
  }

  .legend-bar {
    position: absolute;
    bottom: 60px;
    display: flex;
    gap: 32px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .legend-label {
    font-size: 14px;
    color: rgba(255,255,255,0.35);
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="slide" id="closing">
  <div class="crosshair" style="top:80px;left:120px;"></div>
  <div class="crosshair" style="top:100px;right:180px;"></div>
  <div class="crosshair" style="bottom:120px;left:240px;"></div>
  <div class="crosshair" style="bottom:100px;right:300px;"></div>
  <div class="crosshair" style="top:45%;left:8%;"></div>
  <div class="crosshair" style="top:35%;right:10%;"></div>

  <div class="logo-icon">
    <svg viewBox="0 0 32 32" fill="none">
      <circle cx="16" cy="16" r="10" stroke="#fff" stroke-width="1.5" fill="none"/>
      <circle cx="16" cy="16" r="3" fill="#fff"/>
      <line x1="16" y1="4" x2="16" y2="10" stroke="#fff" stroke-width="1.5"/>
      <line x1="16" y1="22" x2="16" y2="28" stroke="#fff" stroke-width="1.5"/>
      <line x1="4" y1="16" x2="10" y2="16" stroke="#fff" stroke-width="1.5"/>
      <line x1="22" y1="16" x2="28" y2="16" stroke="#fff" stroke-width="1.5"/>
    </svg>
  </div>

  <div class="title">
    <span class="w">Inspector</span><span class="c">Pro</span>
  </div>

  <div class="tagline">Feature-level revision comparison &mdash; built from the CAD model.</div>

  <div class="headline">
    See what <span class="cyan">changed</span>. Know why it <span class="amber">matters</span>.
  </div>

  <div class="cta"></div>

  <div class="legend-bar">
    <div class="legend-item">
      <div class="legend-dot" style="background:#FF5252;"></div>
      <div class="legend-label">Removed</div>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#00E676;"></div>
      <div class="legend-label">Added</div>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#FFB300;"></div>
      <div class="legend-label">Changed</div>
    </div>
  </div>
</div>

</body>
</html>
